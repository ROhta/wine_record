<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; padding: 16px; }
  h1 { font-size: 17px; margin: 0 0 8px; }
  .card { border: 1px solid color-mix(in srgb, currentColor 20%, transparent); border-radius: 10px; padding: 12px; margin: 10px 0; }
  pre { white-space: pre-wrap; word-break: break-all; margin: 6px 0 0; font-size: 13px; }
  button { font: inherit; padding: 10px 14px; border-radius: 8px; border: 1px solid currentColor; background: transparent; color: inherit; cursor: pointer; margin: 6px 6px 0 0; }
  .ok { color: #1a7f37; } .err { color: #c1121f; } .muted { opacity: .65; font-size: 12px; }
</style>

<h1>🍷 ウィジェット描画スパイク (T022a)</h1>
<div class="muted" id="status">初期化中…</div>

<div class="card">
  <strong>ツール結果（ontoolresult で受信）</strong>
  <pre id="result">—</pre>
</div>

<div class="card">
  <strong>ブリッジ往復テスト</strong>
  <div>
    <button id="echo">callServerTool('spike_echo') を呼ぶ</button>
    <button id="msg">sendMessage でチャットに送る</button>
  </div>
  <pre id="bridge">—</pre>
</div>

<script type="module">
/*__EXT_APPS_BUNDLE__*/
const { App } = globalThis.ExtApps;
const $ = (id) => document.getElementById(id);

(async () => {
  try {
    const app = new App({ name: 'WineWidgetSpike', version: '0.0.1' }, {}, { autoResize: true });

    app.ontoolresult = ({ content }) => {
      try {
        const data = JSON.parse(content?.[0]?.text ?? '{}');
        $('result').textContent = JSON.stringify(data, null, 2);
      } catch {
        $('result').textContent = content?.[0]?.text ?? '(空)';
      }
    };

    await app.connect();

    const ctx = app.getHostContext?.() ?? {};
    $('status').textContent = `接続OK / theme=${ctx.theme ?? '?'} / displayMode=${ctx.displayMode ?? '?'}`;
    $('status').className = 'ok';

    $('echo').addEventListener('click', async () => {
      $('bridge').textContent = '呼び出し中…';
      try {
        const r = await app.callServerTool({ name: 'spike_echo', arguments: { text: 'ping from widget' } });
        $('bridge').textContent = 'callServerTool OK:\n' + (r?.content?.[0]?.text ?? JSON.stringify(r));
        $('bridge').className = 'ok';
      } catch (e) {
        $('bridge').textContent = 'callServerTool 失敗: ' + (e?.message ?? e);
        $('bridge').className = 'err';
      }
    });

    $('msg').addEventListener('click', () => {
      app.sendMessage({ role: 'user', content: [{ type: 'text', text: 'ウィジェットのボタンから送信しました（描画スパイク成功）' }] });
      $('bridge').textContent = 'sendMessage 送信済み（チャットを確認）';
    });
  } catch (e) {
    $('status').textContent = '初期化失敗: ' + (e?.message ?? e);
    $('status').className = 'err';
  }
})();
</script>
