# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit 設定。ドキュメント: https://docs.coderabbit.ai/getting-started/yaml-configuration
language: "ja-JP"
tone_instructions: "指摘は具体的に。該当箇所・理由・可能なら修正案を含める。PR 本文の「## 見てほしいところ」を最優先で確認する。"

reviews:
  # 網羅重視モード。細かい指摘まで拾う（見落とし防止を優先）。
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  auto_review:
    enabled: true
    # Draft PR はレビューしない。
    drafts: false
    # 依存更新 PR は CI の品質ゲートで担保するためレビュー対象外。
    ignore_usernames:
      - "dependabot[bot]"

  # 生成物・ロックファイル・データはレビュー対象外。
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/apm_modules/**"
    - "!pnpm-lock.yaml"
    - "!apm.lock.yaml"
    - "!data/**"

  # パス別のレビュー観点。
  path_instructions:
    - path: "src/**/*.ts"
      instructions: |
        - @tsconfig/strictest 準拠。any や型アサーションの濫用を指摘する。
        - MCP ツール定義と zod スキーマの整合性を確認する。
    - path: "iac/**/*.tf"
      instructions: |
        - Auth0 のセキュリティ設定（トークン有効期限、grant_types、callback URL）に注意する。
    - path: "tests/**"
      instructions: |
        - テスト名が仕様を表現しているか、境界値・異常系がカバーされているか確認する。

  # 静的解析ツール連携（CodeRabbit 側で実行され、指摘がインラインコメントになる）。
  tools:
    eslint:
      enabled: true # eslint.config.mjs を自動利用
    actionlint:
      enabled: true # .github/workflows/ の検証
    gitleaks:
      enabled: true # シークレット漏洩検知
    checkov:
      enabled: true # Terraform (iac/) のセキュリティスキャン
    markdownlint:
      enabled: true
    yamllint:
      enabled: true

knowledge_base:
  code_guidelines:
    enabled: true
    # SoT は .apm/instructions/（CLAUDE.md は gitignore 済み生成物のため自動検出されない）。
    filePatterns:
      - ".apm/instructions/*.md"

chat:
  # @coderabbitai へのメンションに自動応答する。
  auto_reply: true
